<!DOCTYPE html>
<html lang="zh-cn">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Mader</title>
    <link rel="stylesheet" href="./style.css">
    <script src="../queryPlus.js"></script>
</head>

<body>
    <div id="header">
        <div class="wrapper">
            <a href="../index.html">
                <img src="../img/exitBtn.svg" alt="X">
            </a>
            <h1>线条拟合者</h1>
            <a href="javascript:location.reload();">
                <img src="../img/reloadBtn.svg" alt="O">
            </a>
        </div>
    </div>
    <div id="center">
        <div id="attr-side">
            <h1 id="formula">y = k x</h1>
            <br>
            <p><label for="scale">缩放 </label><input type="number" id="scales" value="0.05" step="0.05"> <input type="range" id="scale" value="0.05" max="1" min="0.05" step="0.01"></p>
            <br>
            <p><label for="val-k">k = </label><input type="number" id="vals-k" value="0.0" step="0.1"><input type="range" id="val-k" min="-10" max="10" step="0.1" value="0"></p>
            <p><label for="val-m">m = </label><input type="number" id="vals-m" value="0.0" step="0.1"><input type="range" id="val-m" min="-10" max="10" step="0.1" value="0"></p>
            <p><label for="val-n">n = </label><input type="number" id="vals-n" value="0.0" step="0.1"><input type="range" id="val-n" min="-10" max="10" step="0.1" value="0"></p>
            <br>
            <button id="next">下一关</button>
        </div>
        <div id="canvas-side">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    <script src="./app.js"></script>
</body>

</html>
