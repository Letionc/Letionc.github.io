<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>Calc Animation</title>
    <link rel="stylesheet" href="./2_style.css">
    <script src="./queryPlus.js"></script>
</head>
<body>
    <div id="root">
        <a href="./index.html" style="text-align: center; display:inline-block; width: 100%; color: #5af; text-decoration: none;">上一页</a><br>
        <label for="t">当前时间t(秒): </label><input type="number" id="t" step="0.05" min="0" value="0"><br>
        <br>
        <label for="y">下落距离y(格): </label><input type="number" id="y" step="1" min="0" value="0"><br>
        <label for="y_v0">向上初速v<sub>0</sub>(格): </label><input type="number" id="y_v0" step="0.05" value="0"><br>
        <label for="y_g">当前重力g: </label><input type="number" id="y_g" step="0.1" min="0.1" value="1"><br>
        <br>
        <label for="x">当前走路x(格): </label><input type="number" id="x" step="1" min="0" value="0"><br>
        <label for="x_v">当前速度倍v: </label><input type="number" id="x_v" step="0.05" min="0" value="1"><br>
        <label for="x_r">奔跑</label><input type="checkbox" id="x_r"><br>
        <label for="x_b">初加速</label><input type="checkbox" id="x_b" checked><br>
        <label for="x_e">后刹车</label><input type="checkbox" id="x_e" checked><br>
    </div>
    <script src="./2_app.js"></script>
</body>
</html>
